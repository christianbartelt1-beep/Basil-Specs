<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Basil Kitchens — Specs Técnicas</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0F1117; color: #fff; font-family: Georgia, serif; min-height: 100vh; }

    .header {
      background: #161B27; border-bottom: 1px solid #1E2433;
      padding: 18px 32px; display: flex; align-items: center; gap: 14px;
    }
    .bar { width: 4px; height: 40px; background: #C9A96E; border-radius: 2px; }
    .label { font-size: 10px; letter-spacing: 4px; color: #C9A96E; font-family: Calibri,sans-serif; text-transform: uppercase; }
    .title { font-size: 20px; font-weight: bold; margin-top: 2px; }
    .export-btn {
      margin-left: auto; background: transparent; border: 1px solid #C9A96E;
      color: #C9A96E; padding: 8px 20px; cursor: pointer;
      font-family: Calibri,sans-serif; font-size: 12px; letter-spacing: 2px; display: none;
    }

    .main { padding: 32px; max-width: 1100px; margin: 0 auto; }
    .card { background: #161B27; border: 1px solid #1E2433; padding: 28px; margin-bottom: 28px; }
    .grid { display: grid; grid-template-columns: 1fr 2fr; gap: 24px; align-items: start; }

    label { display: block; font-size: 10px; letter-spacing: 3px; color: #C9A96E; font-family: Calibri,sans-serif; margin-bottom: 8px; text-transform: uppercase; }
    input, textarea {
      width: 100%; background: #0F1117; border: 1px solid #1E2433;
      color: #fff; padding: 10px 14px; font-family: Calibri,sans-serif; font-size: 14px; outline: none;
    }
    textarea { resize: vertical; line-height: 1.8; }
    input::placeholder, textarea::placeholder { color: #3A4055; }

    .hint { margin-top: 16px; font-size: 11px; color: #8A8FA8; font-family: Calibri,sans-serif; line-height: 1.7; }
    .hint strong { color: #BFC5D4; display: block; margin-bottom: 4px; }

    .btn {
      margin-top: 16px; background: #C9A96E; color: #0F1117; border: none;
      padding: 12px 32px; cursor: pointer; font-family: Calibri,sans-serif;
      font-size: 12px; font-weight: bold; letter-spacing: 3px; transition: opacity 0.2s;
    }
    .btn:disabled { background: #1E2433; color: #8A8FA8; cursor: not-allowed; }
    .btn:not(:disabled):hover { opacity: 0.85; }
    .err { color: #E05555; font-size: 12px; margin-top: 8px; font-family: Calibri,sans-serif; }

    .tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
    .tab {
      background: #161B27; color: #BFC5D4; border: 1px solid #1E2433;
      padding: 6px 16px; cursor: pointer; font-family: Calibri,sans-serif; font-size: 12px;
    }
    .tab.active { background: #C9A96E; color: #0F1117; border-color: #C9A96E; }
    .loading-tab {
      background: #161B27; border: 1px solid #1E2433; padding: 6px 16px;
      font-family: Calibri,sans-serif; font-size: 12px; color: #8A8FA8;
      display: flex; align-items: center; gap: 8px;
    }
    .dot { width: 8px; height: 8px; background: #C9A96E; border-radius: 50%; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .result { background: #161B27; border: 1px solid #1E2433; padding: 28px; }
    .r-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; padding-bottom: 20px; border-bottom: 1px solid #1E2433; }
    .r-tipo { font-size: 10px; letter-spacing: 3px; color: #7BB8A4; font-family: Calibri,sans-serif; text-transform: uppercase; margin-bottom: 6px; }
    .r-modelo { font-size: 22px; font-weight: bold; }
    .conf-box { background: #0F1117; border: 1px solid #1E2433; padding: 8px 16px; text-align: center; min-width: 100px; }
    .conf-label { font-size: 9px; letter-spacing: 2px; color: #8A8FA8; font-family: Calibri,sans-serif; margin-bottom: 4px; text-transform: uppercase; }
    .conf-val { font-size: 13px; font-weight: bold; font-family: Calibri,sans-serif; text-transform: uppercase; }

    .specs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 18px; }
    .spec { background: #0F1117; border: 1px solid #1E2433; padding: 14px; }
    .spec.hl { border-color: #8B6F42; }
    .spec.full { grid-column: 1 / -1; }
    .spec-label { font-size: 9px; letter-spacing: 2px; color: #8A8FA8; font-family: Calibri,sans-serif; text-transform: uppercase; margin-bottom: 8px; }
    .spec-label.hl { color: #C9A96E; }
    .spec-val { font-size: 14px; color: #BFC5D4; font-family: Calibri,sans-serif; line-height: 1.6; }

    .src { font-size: 11px; color: #8A8FA8; font-family: Calibri,sans-serif; border-top: 1px solid #1E2433; padding-top: 12px; }
    .warn-banner { margin-top: 12px; background: #1A1208; border: 1px solid #8B6F42; padding: 12px 16px; font-size: 12px; color: #C9A96E; font-family: Calibri,sans-serif; }

    .empty { text-align: center; padding: 60px 40px; color: #8A8FA8; font-family: Calibri,sans-serif; border: 1px dashed #1E2433; }
    .empty-icon { font-size: 36px; margin-bottom: 16px; opacity: 0.3; }
    .empty-title { font-size: 15px; color: #BFC5D4; margin-bottom: 8px; }

    .err-state { text-align: center; padding: 40px; color: #8A8FA8; font-family: Calibri,sans-serif; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0F1117; }
    ::-webkit-scrollbar-thumb { background: #2A3145; border-radius: 3px; }

    @media(max-width:700px) { .grid{grid-template-columns:1fr} .specs-grid{grid-template-columns:1fr} .spec.full{grid-column:1} }
  </style>
</head>
<body>

<div class="header">
  <div class="bar"></div>
  <div>
    <div class="label">Basil Kitchens®</div>
    <div class="title">Extractor de Specs Técnicas</div>
  </div>
  <button class="export-btn" id="exportBtn" onclick="exportTxt()">EXPORTAR TXT</button>
</div>

<div class="main">
  <div class="card">
    <div class="grid">
      <div>
        <label>Proyecto (opcional)</label>
        <input type="text" id="projectName" placeholder="Ej. Cóndores 440 — CL PPAL" />
        <div class="hint">
          <strong>Un modelo por línea. Ejemplos:</strong>
          Smeg SOPU3304TPX<br>Bosch HBL8651UC<br>Miele F 2811 Vi<br>Sub-Zero BI-36U/S
        </div>
      </div>
      <div>
        <label>Modelos de electrodomésticos</label>
        <textarea id="modelInput" rows="6" placeholder="Teka DLH 982 T&#10;Teka EFX 90.1 6G AI AL 2DR CI&#10;Smeg STL372QSMX"></textarea>
        <div id="errMsg" class="err"></div>
        <button class="btn" id="searchBtn" onclick="startSearch()">BUSCAR SPECS</button>
      </div>
    </div>
  </div>
  <div id="resultsArea">
    <div class="empty">
      <div class="empty-icon">⌕</div>
      <div class="empty-title">Ingresa los modelos del proyecto y presiona Buscar Specs</div>
      <div style="font-size:12px">El sistema buscará fichas técnicas en tiempo real para cada equipo</div>
    </div>
  </div>
</div>

<script>
const FIELDS = [
  {key:'dimensiones_instalacion', label:'Dimensiones de instalación', hl:true},
  {key:'espacios_libres', label:'Espacios libres requeridos'},
  {key:'tipo_conexion', label:'Tipo de conexión'},
  {key:'voltaje', label:'Voltaje / Potencia'},
  {key:'apertura_puerta', label:'Apertura de puerta / acceso'},
  {key:'restricciones_especiales', label:'Restricciones especiales', full:true},
  {key:'notas_fabricacion', label:'Notas para fabricación', hl:true, full:true},
];

let results=[], active=null, loading=null;

function confColor(c){ return c==='alta'?'#4CAF7D':c==='media'?'#C9A96E':'#E05555'; }

async function fetchSpec(model){
  const r = await fetch('/api/specs', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({model})
  });
  return r.json();
}

async function startSearch(){
  const input = document.getElementById('modelInput').value.trim();
  if(!input){ document.getElementById('errMsg').textContent='Ingresa al menos un modelo.'; return; }
  document.getElementById('errMsg').textContent='';
  const models = input.split('\n').map(l=>l.trim()).filter(l=>l.length>2);
  results=[]; active=null;
  document.getElementById('searchBtn').disabled=true;
  document.getElementById('exportBtn').style.display='none';

  for(const model of models){
    loading=model; render();
    try{
      const data = await fetchSpec(model);
      results.push({model, specs:data.specs, error:data.error||null});
    }catch(e){
      results.push({model, specs:null, error:e.message});
    }
    if(!active) active=results[0].model;
  }
  loading=null;
  document.getElementById('searchBtn').disabled=false;
  if(results.length) document.getElementById('exportBtn').style.display='block';
  render();
}

function render(){
  const area = document.getElementById('resultsArea');
  if(!results.length && !loading){ return; }

  let html = '<div class="tabs">';
  results.forEach(r=>{
    const lbl = r.specs?.tipo ? `${r.specs.tipo} · ${r.specs.marca||r.model}` : r.model;
    const warn = !r.specs ? ' ⚠' : '';
    html += `<button class="tab ${active===r.model?'active':''}" onclick="setActive('${r.model.replace(/'/g,"\\'")}')"> ${lbl}${warn}</button>`;
  });
  if(loading) html += `<div class="loading-tab"><div class="dot"></div>Buscando ${loading}...</div>`;
  html += '</div>';

  const cur = results.find(r=>r.model===active);
  if(cur){
    if(cur.specs){
      const conf = cur.specs.confianza||'—';
      let grid = '<div class="specs-grid">';
      FIELDS.forEach(f=>{
        const v = cur.specs[f.key];
        if(!v||v==='No especificado') return;
        grid += `<div class="spec ${f.hl?'hl':''} ${f.full?'full':''}">
          <div class="spec-label ${f.hl?'hl':''}">${f.label}</div>
          <div class="spec-val">${v}</div>
        </div>`;
      });
      grid += '</div>';
      const src = cur.specs.fuente ? `<div class="src">Fuente: ${cur.specs.fuente}</div>` : '';
      const wb = conf!=='alta' ? `<div class="warn-banner">⚠ Confianza ${conf}. Verificar contra ficha técnica oficial antes de fabricar.</div>` : '';
      html += `<div class="result">
        <div class="r-header">
          <div>
            <div class="r-tipo">${cur.specs.tipo||'Electrodoméstico'}</div>
            <div class="r-modelo">${cur.specs.marca||''} ${cur.specs.modelo||cur.model}</div>
          </div>
          <div class="conf-box">
            <div class="conf-label">Confianza</div>
            <div class="conf-val" style="color:${confColor(conf)}">${conf}</div>
          </div>
        </div>
        ${grid}${src}${wb}
      </div>`;
    } else {
      html += `<div class="result"><div class="err-state">
        <div style="font-size:32px;color:#E05555;margin-bottom:12px">⚠</div>
        <div style="font-size:14px;color:#BFC5D4;margin-bottom:6px">No se pudieron obtener specs para:</div>
        <div style="font-size:16px;font-weight:bold;color:#fff">${cur.model}</div>
        <div style="font-size:12px;margin-top:12px">Verifica el modelo o busca manualmente en el sitio del fabricante.</div>
      </div></div>`;
    }
  }
  area.innerHTML = html;
}

function setActive(m){ active=m; render(); }

function exportTxt(){
  const proj = document.getElementById('projectName').value;
  let out = `BASIL KITCHENS® — SPECS TÉCNICAS\n`;
  if(proj) out += `Proyecto: ${proj}\n`;
  out += `Generado: ${new Date().toLocaleDateString('es-MX')}\n\n${'='.repeat(60)}\n\n`;
  results.forEach(r=>{
    out += `MODELO: ${r.model}\n`;
    if(r.specs){
      out += `Tipo: ${r.specs.tipo||'-'}\nMarca: ${r.specs.marca||'-'}\n\n`;
      FIELDS.forEach(f=>{ if(r.specs[f.key]&&r.specs[f.key]!=='No especificado') out+=`${f.label}:\n  ${r.specs[f.key]}\n\n`; });
      if(r.specs.fuente) out+=`Fuente: ${r.specs.fuente}\n`;
      if(r.specs.confianza) out+=`Confianza: ${r.specs.confianza}\n`;
    } else { out+=`Error: ${r.error||'Sin datos'}\n`; }
    out += `\n${'-'.repeat(60)}\n\n`;
  });
  const a=document.createElement('a');
  a.href='data:text/plain;charset=utf-8,'+encodeURIComponent(out);
  a.download=`specs_${proj||'proyecto'}_${Date.now()}.txt`;
  a.click();
}
</script>
</body>
</html>
